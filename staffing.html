<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staffing — GersBes</title>
<link rel="icon" href="assets/icons/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="staffing.html">

<header class="navbar" id="siteNav"></header>

<main>
  <section class="page-header">
    <div class="container">
      <h1 id="pageTitle">Staffing</h1>
      <p id="pageIntro">Servers I currently staff or have staffed.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <h2>Servers</h2>
        <p>Edit the "servers" list in content.js to add, remove, or update these.</p>
      </div>
      <div class="grid" id="serverGrid"></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="section-head reveal">
        <h2>Experience</h2>
        <p>A timeline of staffing roles — edit "staffing.experience" in content.js.</p>
      </div>
      <div class="card reveal" id="timelineList" style="max-width:780px;margin:0 auto;"></div>
    </div>
  </section>
</main>

<footer id="siteFooter"></footer>

<script src="js/content.js"></script>
